name: Daily scrape

on:
  schedule:
    # 06:00 UTC daily (reminders run inside Convex crons, not here).
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright browser (Crawl4AI)
        run: uv run playwright install --with-deps chromium

      - name: Run scraper (all sources)
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_ADMIN_KEY: ${{ secrets.CONVEX_ADMIN_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python -m src.pipeline --all
